services:
  postgres:
    image: postgres:16-alpine
    container_name: connecta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-connecta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connectapass}
      POSTGRES_DB: ${POSTGRES_DB:-connectadb}
    ports:
      - "5432:5432"
    volumes:
      - connecta_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: connecta-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - connecta_redis_data:/data

volumes:
  connecta_postgres_data:
  connecta_redis_data:
